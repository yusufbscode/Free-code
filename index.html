<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0a0a0a;

}

/* ÜST ALAN */
.hero {
    background: url("https://images.unsplash.com/photo-1619767886558-efdc259cde1a") center/cover;
    height: 320px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 34px;
    font-weight: bold;
    text-shadow: 3px 3px 10px black;
}

/* GENEL */
.section {
    padding: 25px;
    text-align: center;
}

/* KART */
.card {
    background: #1a1a1a;
    margin: 15px;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 0 15px red;
    transition: 0.3s;
}
.card:hover {
    transform: scale(1.05);
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
}

/* RESİM */
img {
    width: 100%;
    border-radius: 10px;
}

/* BUTON */
button {
    padding: 15px 25px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}
.call { background: green; color: white; }
.insta { background: purple; color: white; }

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: green;
    padding: 15px;
    border-radius: 50%;
    font-size: 20px;
}

/* HARİTA */
iframe {
    width: 100%;
    height: 300px;
    border-radius: 10px;
}

/* FOOTER */
footer {
    background: black;
    padding: 15px;
}
</style>
</head>
